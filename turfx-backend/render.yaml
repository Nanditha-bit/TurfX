
services:
  - type: web
    name: turfx-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: turfx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRES_DAYS
        value: 30
      - key: ADMIN_PHONE
        value: +919999999999
      - key: ADMIN_PASSWORD
        value: admin@123
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE_MB
        value: 10

databases:
  - name: turfx-db
    plan: free
    databaseName: turfx_db
    user: turfx_user
